# 可重用 Rust 重構 gate：lint、unit/FFI 與 opt-in parity matrix。
# 預設產品 build 仍走 C；此 gate 保護 foundation、discover/filter/yaml、
# pipeline registry/plan/route/分類器、Store FTS tokenizer
# /mmap resolver/immutable URI/search pattern/arch helper、MCP codec、traces、CLI progress sink、
# Cypher helpers 等 Rust opt-in，以及 default C path 與 Rust pipeline opt-in 的
# language-graph parity。
# Rust dependency audit 與 dangerous-API allow-list 位於 _security.yml。
name: Rust

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

      # ubuntu-latest ships a stable Rust toolchain; make clippy/rustfmt
      # explicit so the lint gate never silently degrades.
      - name: Ensure Rust components
        run: |
          rustup component add clippy rustfmt
          rustc --version && cargo --version && cargo clippy --version

      - name: Rust gates (lint + unit + FFI + opt-in parity)
        run: make -f Makefile.cbm rust-ci-tests
